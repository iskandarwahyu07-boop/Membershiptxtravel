<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aplikasi Membership TX Travel (Firebase)</title>
    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #f4f6f9; }
        .card-passport {
            border: 2px solid #09d5a9; /* Warna sesuai request */
            border-radius: 10px;
            background: white;
            padding: 20px;
            box-shadow: 0 4px 8px rgba(0,0,0,0.1);
            max-width: 500px;
            margin: 0 auto;
        }
        .passport-header {
            background-color: #09d5a9;
            color: white;
            padding: 10px;
            border-radius: 8px 8px 0 0;
            text-align: center;
            font-weight: bold;
        }
        .passport-body { padding: 20px; }
        .passport-footer {
            background-color: #e9ecef;
            padding: 10px;
            text-align: center;
            border-radius: 0 0 8px 8px;
            font-size: 0.8rem;
        }
        .scan-img {
            max-width: 100%;
            height: auto;
            border: 1px solid #ddd;
            margin-top: 10px;
        }
        .hidden { display: none; }
        
        /* Custom Button Color */
        .btn-custom {
            background-color: #09d5a9;
            color: white;
            border: none;
        }
        .btn-custom:hover {
            background-color: #07b38e;
            color: white;
        }
    </style>
</head>
<body>

<div class="container py-5">
    <h2 class="text-center mb-4">🛫 TX Travel Membership</h2>

    <!-- Navigasi Tab -->
    <ul class="nav nav-pills mb-3 justify-content-center" id="pills-tab" role="tablist">
        <li class="nav-item" role="presentation">
            <button class="nav-link active" id="pills-input-tab" data-bs-toggle="pill" data-bs-target="#pills-input" type="button">Input Data</button>
        </li>
        <li class="nav-item" role="presentation">
            <button class="nav-link" id="pills-search-tab" data-bs-toggle="pill" data-bs-target="#pills-search" type="button">Cari Data</button>
        </li>
    </ul>

    <div class="tab-content" id="pills-tabContent">
        
        <!-- HALAMAN INPUT DATA -->
        <div class="tab-pane fade show active" id="pills-input">
            <div class="card shadow-sm">
                <div class="card-header bg-primary text-white">Form Input Member</div>
                <div class="card-body">
                    <form id="formInput">
                        <div class="mb-3">
                            <label class="form-label">Nama Lengkap</label>
                            <input type="text" class="form-control" id="inputNama" required placeholder="Contoh: Budi Santoso">
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Nomor Telepon (Untuk Search)</label>
                            <input type="number" class="form-control" id="inputNoTelp" required placeholder="Contoh: 08123456789">
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Nomor Paspor</label>
                            <input type="text" class="form-control" id="inputPaspor" required placeholder="Contoh: A12345678">
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Tanggal Expired Paspor</label>
                            <input type="date" class="form-control" id="inputExpired" required>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Scan Paspor (File Gambar)</label>
                            <input type="file" class="form-control" id="inputFile" accept="image/*">
                            <div class="form-text">Maksimal 2MB.</div>
                        </div>
                        <button type="submit" class="btn btn-custom w-100">Simpan Data</button>
                    </form>
                </div>
            </div>
        </div>

        <!-- HALAMAN SEARCH DATA -->
        <div class="tab-pane fade" id="pills-search">
            <div class="row justify-content-center">
                <div class="col-md-6">
                    <div class="input-group mb-3">
                        <input type="number" class="form-control" id="searchTelp" placeholder="Masukkan Nomor Telepon...">
                        <button class="btn btn-custom" type="button" onclick="cariData()">Cari</button>
                    </div>
                </div>
            </div>

            <!-- Tampilan Hasil (Kartu Paspor) -->
            <div id="hasilSearch" class="hidden">
                <div class="card-passport">
                    <div class="passport-header">
                        TX TRAVEL MEMBERSHIP
                    </div>
                    <div class="passport-body">
                        <div class="row">
                            <div class="col-6">
                                <p><strong>Nama:</strong> <span id="resNama"></span></p>
                                <p><strong>No. Paspor:</strong> <span id="resPaspor"></span></p>
                                <p><strong>Expired:</strong> <span id="resExpired"></span></p>
                            </div>
                            <div class="col-6 text-center">
                                <img src="https://via.placeholder.com/150" id="resFoto" class="rounded-circle border" alt="Foto">
                            </div>
                        </div>
                        <hr>
                        <p class="text-muted small">Scan Dokumen:</p>
                        <img id="resScan" class="scan-img" src="" alt="Scan Paspor">
                        <br>
                        <a id="btnDownload" href="#" target="_blank" class="btn btn-sm btn-outline-dark mt-2">Download Scan Paspor</a>
                    </div>
                    <div class="passport-footer">
                        Data Valid & Terverifikasi
                    </div>
                </div>
            </div>
            
            <div id="pesanError" class="alert alert-warning text-center hidden">Data tidak ditemukan dengan nomor tersebut.</div>
        </div>
    </div>
</div>

<!-- Firebase SDKs -->
<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-storage-compat.js"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

<script>
    // Import the functions you need from the SDKs you need
    import { initializeApp } from "firebase/app";
    import { getAnalytics } from "firebase/analytics";
    // TODO: Add SDKs for Firebase products that you want to use
    // https://firebase.google.com/docs/web/setup#available-libraries
    const firebaseConfig = {
  	    apiKey: "AIzaSyB0XtP5znGmjkIZDwWslYAyYfA6MQ97fn4",
  	    authDomain: "txtraveldatabase.firebaseapp.com",
  	    projectId: "txtraveldatabase",
  	    storageBucket: "txtraveldatabase.firebasestorage.app",
  	    messagingSenderId: "682844342296",
  	    appId: "1:682844342296:web:74f3961f807f7fcc0b1b6d",
  	    measurementId: "G-QK93MVVTQT"
    };

    // Inisialisasi Firebase
    const app = initializeApp(firebaseConfig);
    const analytics = getAnalytics(app);

    // ==========================================
    // 2. LOGIKA UPLOAD DATA
    // ==========================================
    document.getElementById('formInput').addEventListener('submit', function(e) {
        e.preventDefault();

        const nama = document.getElementById('inputNama').value;
        const telp = document.getElementById('inputNoTelp').value;
        const paspor = document.getElementById('inputPaspor').value;
        const expired = document.getElementById('inputExpired').value;
        const fileInput = document.getElementById('inputFile');

        if (fileInput.files.length === 0) {
            alert("Harap upload file scan paspor!");
            return;
        }

        const file = fileInput.files[0];
        const fileName = `passport_${Date.now()}_${telp}.jpg`; // Nama file unik
        const storageRef = storage.ref('txtravel/' + fileName);

        // Upload file ke Firebase Storage
        const uploadTask = storageRef.put(file);

        uploadTask.on('state_changed', 
            (snapshot) => {
                const progress = (snapshot.bytesTransferred / snapshot.totalBytes) * 100;
                console.log('Upload is ' + progress + '% done');
            }, 
            (error) => {
                console.error("Upload error:", error);
                alert("Gagal upload file: " + error.message);
            }, 
            () => {
                // Upload selesai, ambil URL
                uploadTask.snapshot.ref.getDownloadURL().then((downloadURL) => {
                    simpanKeDatabase(nama, telp, paspor, expired, downloadURL);
                });
            }
        );
    });

    function simpanKeDatabase(nama, telp, paspor, expired, scanUrl) {
        // Simpan ke Firestore
        db.collection('members').doc(telp) // ID dokumen adalah nomor telepon
            .set({
                nama: nama,
                telp: telp,
                paspor: paspor,
                expired: expired,
                scanUrl: scanUrl,
                updatedAt: firebase.firestore.FieldValue.serverTimestamp()
            })
            .then(() => {
                alert("Data berhasil disimpan ke Firebase!");
                document.getElementById('formInput').reset();
            })
            .catch((error) => {
                console.error("Error adding document: ", error);
                alert("Gagal menyimpan data: " + error.message);
            });
    }

    // ==========================================
    // 3. LOGIKA SEARCH DATA
    // ==========================================
    function cariData() {
        const telpCari = document.getElementById('searchTelp').value;
        const divHasil = document.getElementById('hasilSearch');
        const divError = document.getElementById('pesanError');

        if(!telpCari) {
            alert("Masukkan nomor telepon!");
            return;
        }

        // Ambil data dari Firestore berdasarkan ID (Nomor HP)
        db.collection('members').doc(telpCari).get().then((doc) => {
            if (doc.exists) {
                const data = doc.data();
                
                // Tampilkan data ke HTML
                document.getElementById('resNama').innerText = data.nama;
                document.getElementById('resPaspor').innerText = data.paspor;
                document.getElementById('resExpired').innerText = data.expired;
                document.getElementById('resScan').src = data.scanUrl;
                
                // Setup tombol download
                const btnDownload = document.getElementById('btnDownload');
                btnDownload.href = data.scanUrl;
                btnDownload.download = `Scan_Paspor_${data.nama}.jpg`; // Nama file saat download

                divHasil.classList.remove('hidden');
                divError.classList.add('hidden');
            } else {
                divHasil.classList.add('hidden');
                divError.classList.remove('hidden');
            }
        }).catch((error) => {
            console.log("Error getting document:", error);
            alert("Terjadi kesalahan saat mengambil data.");
        });
    }
</script>

</body>

</html>
